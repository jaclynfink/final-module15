<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, Arial, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #111827, #2563eb);
            color: #111827;
        }
        .card {
            width: min(420px, calc(100% - 2rem));
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
        }
        h1 {
            margin: 0 0 0.5rem;
        }
        p {
            color: #4b5563;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            margin-top: 0.4rem;
            padding: 0.85rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.95rem 1rem;
            border: 0;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .status {
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            background: #eff6ff;
            color: #1e3a8a;
            white-space: pre-wrap;
        }
        .status.error {
            background: #fef2f2;
            color: #991b1b;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        a {
            color: #1d4ed8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Create account</h1>
        <p>Register a new user account.</p>
        <form id="register-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" minlength="3" maxlength="50" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="8" maxlength="128" required>

            <button type="submit">Register</button>
        </form>
        <div id="status" class="status" hidden></div>
        <div class="links">
            <a href="/">Home</a>
            <a href="/login">Already have an account?</a>
        </div>
    </main>

    <script>
        const form = document.getElementById('register-form');
        const statusBox = document.getElementById('status');

        function renderStatus(message, isError = false) {
            statusBox.hidden = false;
            statusBox.className = isError ? 'status error' : 'status';
            statusBox.textContent = message;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            const data = await response.json();
            if (!response.ok) {
                renderStatus(data.error || 'Registration failed.', true);
                return;
            }

            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('current_user', JSON.stringify(data.user));
            renderStatus(`Registration successful for ${data.user.username}.\nToken stored in localStorage.`);
            form.reset();
        });
    </script>
</body>
</html>
